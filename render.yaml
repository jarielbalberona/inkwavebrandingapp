# Initial Render deployment contract for Ink Wave Branding App.
#
# The web static site is deployable with the current workspace. The API service
# shape is documented below, but it remains commented out until deployment work
# wires Render database credentials and performs a live smoke.

services:
  - type: web
    name: ink-wave-branding-web
    runtime: static
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter web build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

