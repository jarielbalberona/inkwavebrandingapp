# Initial Render deployment contract for Ink Wave Branding App.
#
# This file defines the service shape only. It does not prove live deployment
# health. Render environment values stay dashboard-managed.

services:
  - type: web
    name: ink-wave-branding-web
    runtime: static
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter web build
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

  - type: web
    name: ink-wave-branding-api
    runtime: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm --filter @workspace/pdfs build && pnpm --filter @workspace/api build
    preDeployCommand: pnpm --filter @workspace/api db:migrate:deploy
    startCommand: pnpm --filter @workspace/api start
    healthCheckPath: /health
    # DB connection uses split vars (passwords with @/# are safe). Set these in the dashboard; do not commit values.
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        value: "5432"
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: DATABASE_SSL_MODE
        value: require
      - key: AUTH_SESSION_SECRET
        sync: false
      - key: AUTH_SESSION_TTL_SECONDS
        value: "28800"
      - key: WEB_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0"
      - key: OPENAI_API_KEY
        sync: false
      - key: STORAGE_PROVIDER
        value: r2
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: R2_USE_PUBLIC_CDN
        value: "true"
      - key: UPLOAD_MAX_FILE_BYTES
        value: "5242880"
      - key: UPLOAD_MAX_REQUEST_BYTES
        value: "52428800"
