# Initial Render deployment contract for Ink Wave Branding App.
#
# This file defines the service shape only. It does not prove live deployment
# health. Render environment values stay dashboard-managed.

services:
  - type: web
    name: ink-wave-branding-web
    runtime: static
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter web build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

  - type: web
    name: ink-wave-branding-api
    runtime: node
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api build
    startCommand: pnpm --filter @workspace/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL_MODE
        value: require
      - key: AUTH_SESSION_SECRET
        sync: false
      - key: AUTH_SESSION_TTL_SECONDS
        value: "28800"
      - key: WEB_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0"
      - key: OPENAI_API_KEY
        sync: false
