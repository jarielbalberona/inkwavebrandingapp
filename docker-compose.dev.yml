services:
  postgres:
    image: postgres:16-alpine
    container_name: ink_wave_branding_app
    restart: unless-stopped
    environment:
      POSTGRES_DB: ink_wave_branding_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ink_wave_branding_app-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ink_wave -d ink_wave_branding_app",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  ink_wave_branding_app-data:
